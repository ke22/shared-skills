# Reusable health check for unattended cron pipelines.
#
# Checks whether the most recent `schedule`-triggered run of a named workflow
# in the CALLING repo succeeded, and files/closes a GitHub issue there
# accordingly. Manual `workflow_dispatch` runs of the watched workflow are
# ignored — only `event=schedule` runs count toward the health signal.
#
# Callers MUST declare `issues: write` and `actions: read` permissions in
# their own workflow file — the token permissions available to this job are
# capped by what the caller grants, regardless of the `permissions:` block
# below.
name: Pipeline Health Check

"on":
  workflow_call:
    inputs:
      workflow-file:
        description: "Filename of the pipeline workflow to check (e.g. notion-sync.yml)"
        required: true
        type: string
      stale-after-hours:
        description: "Hours after which a missing scheduled run is treated as a failure"
        required: false
        type: number
        default: 26

permissions:
  actions: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check most recent scheduled run and manage health issue
        uses: actions/github-script@v7
        env:
          WORKFLOW_FILE: ${{ inputs.workflow-file }}
          STALE_AFTER_HOURS: ${{ inputs.stale-after-hours }}
        with:
          script: |
            const workflowFile = process.env.WORKFLOW_FILE;
            const staleAfterHours = Number(process.env.STALE_AFTER_HOURS);
            const { owner, repo } = context.repo;
            const issueTitle = `[Pipeline Health] ${workflowFile} on ${repo}`;
            const thisRunUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            let latestRun = null;
            try {
              const runsResp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowFile,
                event: "schedule",
                per_page: 1,
              });
              latestRun = runsResp.data.workflow_runs[0] || null;
            } catch (err) {
              core.warning(`Failed to list runs for ${workflowFile}: ${err.message}`);
            }

            let failureReason = null;
            let runUrl = null;

            if (!latestRun) {
              failureReason = `No scheduled (event=schedule) run of \`${workflowFile}\` was found.`;
            } else {
              runUrl = latestRun.html_url;
              const ageHours =
                (Date.now() - new Date(latestRun.created_at).getTime()) / 3_600_000;
              if (ageHours > staleAfterHours) {
                failureReason =
                  `Most recent scheduled run of \`${workflowFile}\` is ${ageHours.toFixed(1)}h old ` +
                  `(limit ${staleAfterHours}h): ${runUrl}`;
              } else if (latestRun.conclusion !== "success") {
                failureReason =
                  `Most recent scheduled run of \`${workflowFile}\` concluded "${latestRun.conclusion}": ${runUrl}`;
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === issueTitle
            );

            if (failureReason) {
              const body = [failureReason, "", `Health check run: ${thisRunUrl}`].join("\n");
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({ owner, repo, title: issueTitle, body });
              }
              core.setFailed(failureReason);
            } else if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Recovered: ${runUrl} succeeded.\n\nHealth check run: ${thisRunUrl}`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
              });
            }
